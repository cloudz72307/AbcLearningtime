<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tab</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&amp;family=Crimson+Text:ital@0;1&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0b07;
    color: #a89880;
    font-family: 'Crimson Text', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 0;
  }
  .clock {
    font-family: 'Cinzel', serif;
    font-size: 72px;
    font-weight: 400;
    color: #c9952a;
    letter-spacing: 8px;
    line-height: 1;
    text-shadow: 0 0 40px rgba(201,149,42,0.15);
  }
  .date {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: #3a3020;
    margin-top: 10px;
    margin-bottom: 48px;
  }
  .search-bar {
    display: flex;
    align-items: center;
    background: #130f09;
    border: 1px solid rgba(201,149,42,0.2);
    border-radius: 4px;
    padding: 12px 18px;
    width: 480px;
    gap: 12px;
    transition: border-color 0.2s;
  }
  .search-bar:focus-within { border-color: rgba(201,149,42,0.5); }
  .search-bar input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #f0e6d0;
    font-family: 'Crimson Text', serif;
    font-size: 16px;
  }
  .search-bar input::placeholder { color: #3a3020; font-style: italic; }
  .search-bar button {
    background: none;
    border: none;
    color: #c9952a;
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    transition: color 0.2s;
  }
  .search-bar button:hover { color: #e8b84b; }
  .brand {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: #1a1510;
    margin-top: 40px;
  }
</style>
</head>
<body>
  <div class="clock" id="clock">08:22 PM</div>
  <div class="date" id="date">Thursday, March 5</div>
  <div class="search-bar">
    <input id="search" type="text" placeholder="Search or enter address..." onkeydown="if(event.key==='Enter') go()">
    <button onclick="go()">→</button>
  </div>
  <div class="brand">ROME</div>

  <script>
    function tick() {
      const n = new Date();
      document.getElementById('clock').textContent = n.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      document.getElementById('date').textContent = n.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
    }
    tick(); setInterval(tick, 1000);

    function go() {
      let val = document.getElementById('search').value.trim();
      if (!val) return;
      if (!val.startsWith('http')) val = 'https://' + val;
      // navigate through scramjet
      location.href = '/scramjet/#' + btoa(val);
    }
  </script>


</body></html>
